    <div class="container">
      	<div class="content">
      		<h2 class="loginText">LOGIN</h2>
			<div class="loginContent">
				<form action="/login" method="post">
          			<div class="inputDiv">

		          	<div class="btnDiv">
		            	<button class="loginBtn" type="submit">로그인</button>
		            	<button class="joinBtn" type="button" onclick=goJoinPage()>회원가입</button>
	          		</div>
          		</form>
        	</div>
      	</div>
    </div>
