<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="container">
      	<div class="content">
      		<h2 class="header">Recycle Monitoring</h2>
            <nav class="tab-menu">
                <a href="/dashboard" class="tab">대시보드</a>
                <a href="/eventLog" class="tab">이벤트 로그</a>
                <a href="/recycleHistory" class="tab">쓰레기 수거 현황</a>
                <a href="/setting" class="tab active">설정</a>
            </nav>

            <div class="dashboard">
                <div class="dflex mb20" style="justify-content: end !important;">
                    <!-- Control -->
                    <button class="control-btn start-btn">
                        Start
                    </button>
                    <button class="control-btn stop-btn ml20">
                        Stop / Return Home
                    </button>
                </div>

                <div class="dflex">
                    <!-- 상태 정보 -->
                    <div class="card w250 h105">
                        <h3>🔋 Battery</h3>
                        <p>Battery : <span id="battery">95%</span></p>
                        <p>Voltage : <span id="voltage">11.9V</span></p>
                    </div>
                    <div class="card w250 h105">
                        <h3>🤖 Robot Status</h3>
                        <p>Status : <span id="robotStatus">Idle</span></p>
                        <p>Speed : <span id="speed">0.00 m/s</span></p>
                    </div>
                    <div class="card w250 h105">
                        <h3>🌐 Detection</h3>
                        <p>Object : <span class="">Plastic Bottle</span></p>
                        <p>Confidence : <span class="">98%</span></p>
                    </div>
                    <div class="card w250 h105">
                        <h3>📋 Mission</h3>
                        <p id="mission">Waiting...</p>
                    </div>
                </div>

                <div class="dflex">
                    <!-- Camera -->
                    <div class="card camera-card w555 mt20">
                        <h3>📷 Camera</h3>
                        <div class="camera-area">
                            Camera Image
                        </div>
                    </div>
                    <!-- Map -->
                    <div class="card map-card w555 mt20">
                        <h3>🗺 Map</h3>
                        <div class="map-area">
                            TurtleBot Map
                        </div>
                    </div>
                </div>
            </div>
      	</div>
    </div>
	
	
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script src="/js/setting.js"></script>

</body>
</html>
